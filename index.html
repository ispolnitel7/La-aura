<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>исполнитель</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:black;
    color:#00ff88;
    font-family:'Share Tech Mono', monospace;
    overflow:hidden;

    animation:flicker 0.08s infinite;
}

/* Сетка */

.bg{
    position:fixed;
    width:100%;
    height:100%;

    background:
    linear-gradient(rgba(0,255,100,0.08) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,100,0.08) 1px, transparent 1px);

    background-size:40px 40px;

    z-index:0;
}

/* Линии монитора */

body::after{
    content:"";
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;

    background:
    repeating-linear-gradient(
        transparent 0px,
        rgba(0,255,100,0.03) 2px,
        transparent 4px
    );

    pointer-events:none;
}

/* Контейнер */

.container{
    position:relative;
    z-index:2;

    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;

    text-align:center;
}

/* Заголовок */

h1{
    font-size:60px;

    text-shadow:
    0 0 10px #00ff88,
    0 0 20px #00ff88,
    0 0 40px #00ff88;
}

/* Печать текста */

.typing{
    overflow:hidden;
    white-space:nowrap;

    border-right:3px solid #00ff88;

    width:0;

    animation:
    typing 4s steps(30,end) forwards,
    blink .7s infinite;
}

@keyframes typing{
    from{
        width:0;
    }

    to{
        width:100%;
    }
}

@keyframes blink{
    50%{
        border-color:transparent;
    }
}

/* Блок */

.box{
    margin-top:30px;

    border:1px solid #00ff88;

    padding:25px;

    width:320px;

    background:rgba(0,0,0,0.7);

    box-shadow:
    0 0 10px #00ff88,
    0 0 20px rgba(0,255,100,0.3);
}

/* Текст */

p{
    margin-top:10px;
    line-height:1.5;
}

h3{
    margin-top:20px;
    color:#00ff88;
}

/* Мерцание */

@keyframes flicker{
    0%{opacity:0.98}
    50%{opacity:1}
    100%{opacity:0.97}
}

</style>
</head>

<body>

<div class="bg"></div>

<div class="container">

<h1 class="typing">
ACCESS GRANTED
</h1>

<div class="box">

<p>исполнитель</p>

<br>

<p>Status: online</p>
<p>Age: 15</p>
<p>Community: KM</p>

<br>

<h3>Profile</h3>

<p>
На данный момент никакой сферой не интересуюсь.
</p>

<p>
Состою в КМ более 3 лет.
</p>

</div>

</div>

</body>
</html>
